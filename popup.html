<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg fill="none" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/0000/svg">
          <path d="M12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2Z" fill="#38BDF8"/>
          <path d="M16 12L10 8V16L16 12Z" fill="#0F172A"/>
        </svg>
      </div>
      <div>
        <h1>RSVP Reader</h1>
        <div class="subtitle">Focus & Learn</div>
      </div>
    </div>

    <div class="setting-group">
      <div class="label-row">
        <label for="wpm">Reading Speed</label>
        <span class="value-display"><span id="wpm-value">300</span> <span class="unit">wpm</span></span>
      </div>
      <input type="range" id="wpm" min="100" max="1000" step="50" value="300">
    </div>

    <div class="setting-group">
      <div class="label-row">
        <label for="chunk-size">Smart Chunk Size</label>
        <span class="value-display"><span id="chunk-value">4</span> <span class="unit">words</span></span>
      </div>
      <input type="range" id="chunk-size" min="1" max="10" step="1" value="4">
      <p class="description">Select text and press <kbd>Ctrl</kbd> + <kbd>Shift</kbd> + <kbd>S</kbd> to read</p>
    </div>
    
    <div class="setting-group">
      <button id="open-reader-btn">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path></svg>
        Open Pasteboard Reader
      </button>
    </div>

    <!-- Monetization Hook -> Ko-fi -->
    <a href="https://ko-fi.com/chenjia0510" target="_blank" class="donate-banner" id="donate-btn">
      <div class="donate-icon">☕</div>
      <div class="donate-text">
        <strong>Buy me a coffee</strong>
        <span>Support development & keep it ad-free</span>
      </div>
      <div class="donate-arrow">💖</div>
    </a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
